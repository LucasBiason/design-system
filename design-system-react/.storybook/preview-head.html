<meta name="description" content="Nortear Design System Preview - Demonstração dos componentes React.">

<!-- GA4 roda no manager (ver manager-head.html). O iframe envia eventos via window.top.gtag. -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" /></noscript>

<!-- Sincronização de Light/Dark para Docs -->
<script>
  (function() {
    const parseGlobals = (raw) => {
      const result = {};
      if (!raw) return result;
      raw.split(';').forEach(pair => {
        const idx = pair.indexOf(':');
        if (idx !== -1) result[pair.slice(0, idx)] = pair.slice(idx + 1);
      });
      return result;
    };

    const BRAND_CLASSES = ['tema-warm', 'tema-cold'];
    const DENSITY_CLASSES = ['densidade-condensado', 'densidade-confortavel'];
    const FONT_CLASSES = ['fonte-lexend', 'fonte-pt-serif', 'fonte-lxgw-wenkai'];

    const syncTheme = () => {
      const globals = parseGlobals(new URLSearchParams(window.location.search).get('globals'));
      const html = document.documentElement;

      // Light / Dark
      if (globals.theme === 'dark') {
        html.classList.add('dark');
        html.style.colorScheme = 'dark';
      } else {
        html.classList.remove('dark');
        html.style.colorScheme = 'light';
      }

      // Brand / Theme (Default = sem classe; Warm/Cold via .tema-<id>)
      html.classList.remove(...BRAND_CLASSES);
      if (globals.brand && globals.brand !== 'default') {
        html.classList.add('tema-' + globals.brand);
      }

      // Density (Default = sem classe; Condensado/Confortável via .densidade-<id>)
      html.classList.remove(...DENSITY_CLASSES);
      if (globals.density && globals.density !== 'default') {
        html.classList.add('densidade-' + globals.density);
      }

      // Font (Default = Inter sem classe; demais via .fonte-<id>)
      html.classList.remove(...FONT_CLASSES);
      if (globals.font && globals.font !== 'default') {
        html.classList.add('fonte-' + globals.font);
      }
    };

    window.addEventListener('load', syncTheme);
    window.addEventListener('popstate', syncTheme);

    let lastGlobals = '';
    setInterval(() => {
      const current = new URLSearchParams(window.location.search).get('globals') || '';
      if (current !== lastGlobals) {
        lastGlobals = current;
        syncTheme();
      }
    }, 500);
  })();
</script>
