apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: design-system-scaffold
  title: Design System — Single Stack
  description: >
    Template para criar um design system com documentação centralizada e um
    framework de sua escolha. Inclui Storybook, temas customizáveis e skills
    do Claude Code para continuar desenvolvendo com IA. Um projeto = uma stack.
    Para usar múltiplas stacks, gere projetos separados.
  tags:
    - design-system
    - frontend
    - component-library
    - storybook
    - claude-code

spec:
  owner: design-team
  type: library

  parameters:
    # ── Passo 1: Identidade do Projeto ──────────────────────────────────────
    - title: Identidade do Projeto
      required:
        - projectName
        - description
        - owner
        - displayName
      properties:
        projectName:
          type: string
          title: Nome do projeto (slug)
          description: Identificador único em kebab-case (ex. "minha-empresa-ds")
          pattern: '^[a-z0-9-]+$'
          ui:autofocus: true

        displayName:
          type: string
          title: Nome de exibição
          description: Nome legível para humanos (ex. "Minha Empresa Design System")

        description:
          type: string
          title: Descrição
          description: Breve descrição do design system

        owner:
          type: string
          title: Time responsável
          description: Squad ou time que mantém o projeto (ex. "squad-plataforma")

        gaId:
          type: string
          title: Google Analytics 4 Measurement ID (opcional)
          description: "Formato: G-XXXXXXXXXX. Deixe vazio para desativar analytics."
          pattern: '^(G-[A-Z0-9]+)?$'

    # ── Passo 2: Framework ───────────────────────────────────────────────────
    - title: Framework
      required:
        - stack
      properties:
        stack:
          type: string
          title: Framework escolhido
          description: >
            Um projeto gera apenas uma stack. Para usar mais de um framework,
            gere projetos separados (ex. "meu-ds-react" e "meu-ds-vue").
            A documentação textual é idêntica em todos os frameworks — apenas
            os exemplos de código variam.
          enum:
            - react
            - vue
            - svelte
            - basecoat
          default: react
          ui:options:
            enumOptions:
              - value: react
                label: "React 19 (shadcn/ui + Radix UI)"
              - value: vue
                label: "Vue 3 (shadcn-vue + Reka UI)"
              - value: svelte
                label: "Svelte 5 (shadcn-svelte + Bits UI)"
              - value: basecoat
                label: "Basecoat — Vanilla TS (basecoat-css + Tailwind)"

        includeChromatic:
          type: boolean
          title: Incluir Chromatic (visual regression)
          description: Captura visual de todos os stories para detectar regressões
          default: false

    # ── Passo 3: Repositório e Integrações ───────────────────────────────────
    - title: Repositório e Integrações
      required:
        - repoUrl
      properties:
        repoUrl:
          title: Repositório GitHub
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com

        includeBackstageIntegration:
          type: boolean
          title: Registrar no catálogo Backstage
          description: Cria catalog-info.yaml para aparecer no portal interno
          default: true

        includeClaudeSkills:
          type: boolean
          title: Incluir skills do Claude Code
          description: >
            Adiciona o diretório .claude/commands/ com as skills especializadas
            para criar componentes, documentação, testes, SEO e qualidade com IA.
            Requer Claude Code CLI (claude.ai/code).
          default: true

  steps:
    # ── Root: arquivos que precisam de template (README, package.json, etc) ──
    - id: fetch-root
      name: Inicializar estrutura raiz
      action: fetch:template
      input:
        url: ./skeleton/root
        copyWithoutTemplating:
          - 'docs/**/*'
          - '.claude/**/*'
        values:
          projectName: ${{ parameters.projectName }}
          displayName: ${{ parameters.displayName }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          gaId: ${{ parameters.gaId }}
          stack: ${{ parameters.stack }}
          includeClaudeSkills: ${{ parameters.includeClaudeSkills }}
          year: ${{ '' | now('YYYY') }}

    # ── Stack única ─────────────────────────────────────────────────────────
    - id: fetch-stack
      name: Adicionar stack escolhida
      action: fetch:template
      input:
        url: ./skeleton/stacks/${{ parameters.stack }}
        targetPath: design-system-${{ parameters.stack }}
        copyWithoutTemplating:
          - 'src/**/*'
          - 'public/**/*'
          - '**/*.md'
        values:
          projectName: ${{ parameters.projectName }}
          displayName: ${{ parameters.displayName }}
          description: ${{ parameters.description }}
          gaId: ${{ parameters.gaId }}
          includeChromatic: ${{ parameters.includeChromatic }}

    # ── Publicar no GitHub ───────────────────────────────────────────────────
    - id: publish
      name: Publicar repositório no GitHub
      action: publish:github
      input:
        description: ${{ parameters.description }}
        repoUrl: ${{ parameters.repoUrl }}
        defaultBranch: main
        repoVisibility: private
        gitCommitMessage: "chore: initialize design system from template"

    # ── Registrar no catálogo Backstage ──────────────────────────────────────
    - id: register
      name: Registrar no catálogo Backstage
      if: ${{ parameters.includeBackstageIntegration }}
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: Repositório no GitHub
        url: ${{ steps['publish'].output.remoteUrl }}
        icon: github
      - title: Ver no catálogo Backstage
        if: ${{ parameters.includeBackstageIntegration }}
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
    text:
      - title: Próximos passos
        content: |
          ## Design System criado com sucesso! 🎉

          **Stack escolhida:** ${{ parameters.stack }}

          ### Instalar dependências
          ```bash
          cd design-system-${{ parameters.stack }}
          npm install
          ```

          ### Abrir o Storybook
          ```bash
          npm run storybook   # http://localhost:6006
          ```

          ### Customizar temas
          Edite `docs/shared/themes/` para ajustar as cores do seu produto.
          Cada tema é um arquivo `.css` com variáveis HSL.

          {% if parameters.includeClaudeSkills %}
          ### Usar as skills do Claude Code
          Abra o projeto no Claude Code e use `/pipeline new <componente>` para criar
          um novo componente com documentação completa.

          Para gerar o mesmo design system em outra stack, rode este template novamente
          escolhendo outro framework (ex. "meu-ds-react" → "meu-ds-vue").
          {% endif %}
